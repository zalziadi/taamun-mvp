<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="treeGlow19" cx="50%" cy="40%" r="45%">
      <stop offset="0%" style="stop-color:#c9b88a;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#c9b88a;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background - night sky -->
  <rect width="800" height="600" fill="#15130f"/>

  <!-- Tree trunk -->
  <path d="M 400 180 L 370 500 L 430 500 L 400 180" fill="#37342f" opacity="0.9"/>

  <!-- Main tree foliage (dark silhouette) -->
  <circle cx="400" cy="180" r="120" fill="#2c2a24" opacity="0.85"/>

  <!-- Branches reaching out -->
  <g stroke="#37342f" stroke-width="4" opacity="0.7">
    <line x1="400" y1="250" x2="280" y2="200"/>
    <line x1="400" y1="250" x2="520" y2="200"/>
    <line x1="400" y1="300" x2="300" y2="280"/>
    <line x1="400" y1="300" x2="500" y2="280"/>
  </g>

  <!-- Branch details - thinner secondary branches -->
  <g stroke="#2c2a24" stroke-width="2" opacity="0.5">
    <line x1="280" y1="200" x2="240" y2="160"/>
    <line x1="280" y1="200" x2="250" y2="240"/>
    <line x1="520" y1="200" x2="560" y2="160"/>
    <line x1="520" y1="200" x2="550" y2="240"/>
    <line x1="300" y1="280" x2="260" y2="300"/>
    <line x1="500" y1="280" x2="540" y2="300"/>
  </g>

  <!-- Tree foliage glow/age aura -->
  <circle cx="400" cy="180" r="140" fill="url(#treeGlow19)"/>

  <!-- Stars in sky around tree -->
  <g opacity="0.5" fill="#e6d4a4">
    <circle cx="150" cy="100" r="1.5"/>
    <circle cx="250" cy="80" r="1"/>
    <circle cx="600" cy="110" r="1.5"/>
    <circle cx="700" cy="70" r="1"/>
    <circle cx="80" cy="200" r="1"/>
    <circle cx="750" cy="250" r="1.5"/>
  </g>

  <!-- Root system suggestion -->
  <g stroke="#37342f" stroke-width="2" opacity="0.3">
    <path d="M 380 500 Q 360 540 350 560"/>
    <path d="M 420 500 Q 440 540 450 560"/>
    <path d="M 400 500 L 400 560"/>
  </g>

  <!-- Ground line -->
  <path d="M 0 500 L 800 500" stroke="#2c2a24" stroke-width="40" opacity="0.6"/>
</svg>