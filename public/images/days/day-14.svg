<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nightSky14" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#15130f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c2a24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Night sky background -->
  <rect width="800" height="600" fill="url(#nightSky14)"/>

  <!-- Mountain silhouette -->
  <path d="M 0 550 L 150 300 L 250 400 L 400 200 L 550 380 L 700 280 L 800 420 L 800 600 L 0 600 Z" fill="#37342f" opacity="0.95"/>

  <!-- Mountain outline highlight -->
  <path d="M 0 550 L 150 300 L 250 400 L 400 200 L 550 380 L 700 280 L 800 420" stroke="#c9b88a" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Snow/light on mountain peaks -->
  <g opacity="0.3">
    <polygon points="150,300 140,320 160,320" fill="#e6d4a4"/>
    <polygon points="400,200 385,230 415,230" fill="#e6d4a4"/>
    <polygon points="700,280 685,310 715,310" fill="#e6d4a4"/>
  </g>

  <!-- Stars scattered across night sky -->
  <g opacity="0.6" fill="#e6d4a4">
    <circle cx="100" cy="80" r="1.5"/>
    <circle cx="200" cy="120" r="1"/>
    <circle cx="320" cy="60" r="1.5"/>
    <circle cx="450" cy="100" r="1"/>
    <circle cx="580" cy="70" r="1.5"/>
    <circle cx="680" cy="130" r="1"/>
    <circle cx="750" cy="90" r="1.5"/>
  </g>

  <!-- Subtle constellations (light lines connecting stars) -->
  <g stroke="#c9b88a" stroke-width="0.5" opacity="0.2">
    <line x1="100" y1="80" x2="200" y2="120"/>
    <line x1="200" y1="120" x2="320" y2="60"/>
    <line x1="450" y1="100" x2="580" y2="70"/>
    <line x1="680" y1="130" x2="750" y2="90"/>
  </g>

  <!-- Glow beneath mountain peaks -->
  <g opacity="0.15">
    <ellipse cx="150" cy="350" rx="80" ry="60" fill="#c9b88a"/>
    <ellipse cx="400" cy="350" rx="100" ry="80" fill="#c9b88a"/>
    <ellipse cx="700" cy="400" rx="80" ry="60" fill="#c9b88a"/>
  </g>
</svg>