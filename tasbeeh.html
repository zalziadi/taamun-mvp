<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مسبحة تمعّن — أسماء الله الحسنى</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4a855;
    --gold-light: #f0d78c;
    --gold-dark: #b8922e;
    --gold-faint: rgba(212,168,85,0.06);
    --bg: #07070c;
    --bg-bead: #0f0f18;
    --text: #e8e0d0;
    --text-dim: #5a5244;
    --string-w: 1px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; overflow:hidden; touch-action:none; }
  body {
    font-family:'Noto Naskh Arabic','Amiri',serif;
    background:var(--bg); color:var(--text);
    -webkit-tap-highlight-color:transparent;
    user-select:none; -webkit-user-select:none;
  }

  /* ═══ Ambient ═══ */
  .ambient {
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(212,168,85,0.03) 0%, transparent 55%);
  }

  /* ═══ App ═══ */
  .app {
    position:relative; z-index:1;
    height:100vh; height:100dvh;
    display:flex; flex-direction:column;
    max-width:480px; margin:0 auto; overflow:hidden;
  }

  /* ═══ Header ═══ */
  .header {
    text-align:center; padding:16px 16px 6px;
    flex-shrink:0; z-index:10;
  }
  .header .logo {
    font-family:'Amiri',serif; font-size:0.65rem;
    color:var(--gold-dark); letter-spacing:0.2em; opacity:0.7;
  }
  .header h1 {
    font-family:'Amiri',serif; font-size:1rem;
    font-weight:700; color:var(--gold); opacity:0.85;
  }

  /* ═══ Counter ═══ */
  .counter-strip {
    display:flex; align-items:center; justify-content:center;
    gap:18px; padding:6px 16px 8px; flex-shrink:0; z-index:10;
  }
  .counter-item { text-align:center; }
  .counter-value {
    font-family:'Amiri',serif; font-size:1.2rem;
    font-weight:700; color:var(--gold-light); line-height:1;
  }
  .counter-label { font-size:0.55rem; color:var(--text-dim); margin-top:1px; }
  .counter-divider { width:1px; height:22px; background:rgba(212,168,85,0.1); }

  /* ═══ Progress ═══ */
  .progress-track {
    height:1px; background:rgba(212,168,85,0.06);
    flex-shrink:0; z-index:10;
  }
  .progress-fill {
    height:100%; width:0%;
    background:linear-gradient(90deg,var(--gold-dark),var(--gold));
    transition:width 0.5s ease;
  }

  /* ═══ Viewport ═══ */
  .bead-viewport {
    flex:1; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }

  /* The string — thin thread */
  .string-line {
    position:absolute; left:50%; top:0; bottom:0;
    width:var(--string-w);
    background:linear-gradient(to bottom,
      transparent 0%,
      rgba(212,168,85,0.12) 20%,
      rgba(212,168,85,0.12) 80%,
      transparent 100%
    );
    transform:translateX(-50%); z-index:1;
  }

  /* ═══ Center magnifier — the sacred lens ═══ */
  .magnifier {
    position:absolute; left:50%; top:50%;
    width:160px; height:160px;
    transform:translate(-50%,-50%);
    z-index:20; pointer-events:none;
  }

  /* Outer breathing ring */
  .magnifier-ring {
    position:absolute; inset:0;
    border-radius:50%;
    border:1px solid rgba(212,168,85,0.2);
    animation:breathe 4s ease-in-out infinite;
  }
  .magnifier-ring::before {
    content:''; position:absolute; inset:-10px;
    border-radius:50%;
    border:1px solid rgba(212,168,85,0.06);
    animation:breathe 4s ease-in-out infinite reverse;
  }
  .magnifier-ring::after {
    content:''; position:absolute; inset:6px;
    border-radius:50%;
    border:1px solid rgba(212,168,85,0.1);
  }

  @keyframes breathe {
    0%,100% { transform:scale(1); opacity:0.6; }
    50% { transform:scale(1.04); opacity:1; }
  }

  /* Magnifier glass effect */
  .magnifier-glass {
    position:absolute; inset:12px;
    border-radius:50%;
    background:radial-gradient(circle,
      rgba(212,168,85,0.06) 0%,
      rgba(212,168,85,0.02) 50%,
      transparent 70%
    );
    backdrop-filter:blur(0.5px);
  }

  /* Name display inside magnifier */
  .magnifier-content {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }

  .mag-name {
    font-family:'Amiri',serif;
    font-size:1.8rem; font-weight:700;
    color:var(--gold-light);
    text-align:center; line-height:1.2;
    transition:all 0.4s ease;
    text-shadow:0 0 30px rgba(212,168,85,0.15);
  }

  .mag-name.ripple {
    animation:nameRipple 0.6s ease;
  }
  @keyframes nameRipple {
    0% { transform:scale(1); }
    20% { transform:scale(1.08); }
    40% { transform:scale(0.97); }
    60% { transform:scale(1.03); }
    100% { transform:scale(1); }
  }

  .mag-index {
    font-size:0.6rem; color:var(--text-dim);
    margin-top:4px; opacity:0.6;
  }

  /* Ripple waves emanating from center on count */
  .ripple-wave {
    position:absolute; left:50%; top:50%;
    width:140px; height:140px;
    border-radius:50%;
    border:1px solid rgba(212,168,85,0.25);
    transform:translate(-50%,-50%) scale(0);
    opacity:0; pointer-events:none; z-index:19;
  }
  .ripple-wave.animate {
    animation:rippleOut 1.2s ease-out forwards;
  }
  @keyframes rippleOut {
    0% { transform:translate(-50%,-50%) scale(0.5); opacity:0.5; }
    100% { transform:translate(-50%,-50%) scale(2.5); opacity:0; }
  }

  /* ═══ Bead track ═══ */
  .bead-track {
    position:absolute; left:0; right:0; z-index:5;
    transition:transform 0.55s cubic-bezier(0.22,0.85,0.32,1);
    will-change:transform;
  }

  /* ═══ Bead (stone) ═══ */
  .bead {
    display:flex; align-items:center; justify-content:center;
    width:100%; height:110px; position:relative;
    cursor:pointer;
  }

  .stone {
    width:52px; height:52px;
    border-radius:50%;
    border:1px solid rgba(212,168,85,0.12);
    background:var(--bg-bead);
    display:flex; align-items:center; justify-content:center;
    position:relative; z-index:2;
    transition:all 0.55s cubic-bezier(0.22,0.85,0.32,1);
    box-shadow:0 1px 8px rgba(0,0,0,0.3);
  }

  .stone-name {
    font-family:'Amiri',serif;
    font-size:0.55rem; font-weight:700;
    color:rgba(232,224,208,0.25);
    text-align:center; line-height:1.15;
    transition:all 0.55s ease;
    padding:0 3px;
  }

  /* Distance-based visibility */
  .bead[data-dist="0"] { opacity:1; }
  .bead[data-dist="0"] .stone {
    width:62px; height:62px;
    border-color:rgba(212,168,85,0.35);
    box-shadow:0 0 20px rgba(212,168,85,0.08);
  }
  .bead[data-dist="0"] .stone-name {
    font-size:0.65rem; color:rgba(212,168,85,0.6);
  }

  .bead[data-dist="1"] { opacity:0.6; }
  .bead[data-dist="1"] .stone { width:50px; height:50px; }
  .bead[data-dist="1"] .stone-name { color:rgba(232,224,208,0.2); }

  .bead[data-dist="2"] { opacity:0.35; }
  .bead[data-dist="2"] .stone { width:44px; height:44px; }

  .bead[data-dist="3"] { opacity:0.18; }
  .bead[data-dist="3"] .stone { width:38px; height:38px; }
  .bead[data-dist="3"] .stone-name { opacity:0; }

  .bead[data-dist="far"] { opacity:0.08; }
  .bead[data-dist="far"] .stone { width:32px; height:32px; }
  .bead[data-dist="far"] .stone-name { opacity:0; }

  /* Counted stone */
  .bead.counted .stone {
    background:linear-gradient(145deg,rgba(212,168,85,0.1),rgba(212,168,85,0.04));
    border-color:rgba(212,168,85,0.2);
  }
  .bead.counted[data-dist="0"] .stone {
    border-color:var(--gold-dark);
    background:linear-gradient(145deg,rgba(212,168,85,0.14),rgba(212,168,85,0.06));
  }

  /* Small thread knot between beads */
  .knot {
    position:absolute; left:50%;
    width:3px; height:3px; border-radius:50%;
    background:rgba(212,168,85,0.08);
    transform:translateX(-50%); z-index:1;
    bottom:-2px;
  }

  /* Count flash */
  .bead.flash .stone {
    animation:stoneFlash 0.5s ease;
  }
  @keyframes stoneFlash {
    0% { box-shadow:0 0 0 0 rgba(212,168,85,0.4); }
    50% { box-shadow:0 0 25px 6px rgba(212,168,85,0.15); }
    100% { box-shadow:0 0 20px rgba(212,168,85,0.08); }
  }

  /* ═══ Floating particles (silent creative touch) ═══ */
  .particles {
    position:absolute; inset:0; pointer-events:none; z-index:0;
    overflow:hidden;
  }
  .particle {
    position:absolute;
    width:2px; height:2px;
    border-radius:50%;
    background:var(--gold);
    opacity:0;
  }
  .particle.drift {
    animation:particleDrift var(--dur) ease-in-out infinite;
    animation-delay:var(--delay);
  }
  @keyframes particleDrift {
    0% { transform:translateY(0) translateX(0); opacity:0; }
    20% { opacity:var(--peak); }
    80% { opacity:var(--peak); }
    100% { transform:translateY(calc(var(--dy))) translateX(calc(var(--dx))); opacity:0; }
  }

  /* ═══ Swipe hint ═══ */
  .swipe-hint {
    position:absolute; bottom:10px; left:50%;
    transform:translateX(-50%); text-align:center;
    z-index:15; pointer-events:none;
    transition:opacity 1.5s ease;
  }
  .swipe-hint.hidden { opacity:0; }
  .swipe-arrow {
    display:block; font-size:1rem; color:var(--gold-dark);
    animation:hintFloat 2.5s ease-in-out infinite; opacity:0.4;
  }
  @keyframes hintFloat {
    0%,100% { transform:translateY(0); opacity:0.3; }
    50% { transform:translateY(6px); opacity:0.6; }
  }
  .swipe-text { font-size:0.5rem; color:var(--text-dim); }

  /* ═══ Footer ═══ */
  .footer {
    flex-shrink:0; padding:10px 20px 22px;
    display:flex; align-items:center; justify-content:center;
    gap:10px; z-index:10;
  }
  .btn {
    font-family:'Noto Naskh Arabic',serif;
    border:none; cursor:pointer; border-radius:50px;
    font-weight:600; transition:all 0.2s ease;
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .btn:active { transform:scale(0.93); }
  .btn-count {
    background:linear-gradient(135deg,var(--gold-dark),var(--gold));
    color:var(--bg); padding:13px 34px;
    font-size:0.9rem; flex:1; max-width:190px;
  }
  .btn-icon {
    width:42px; height:42px;
    background:rgba(212,168,85,0.06);
    border:1px solid rgba(212,168,85,0.1);
    color:var(--gold); font-size:1rem; padding:0;
  }

  /* ═══ Completion ═══ */
  .completion {
    display:none; position:fixed; inset:0;
    background:rgba(7,7,12,0.97);
    z-index:100; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center; padding:40px;
  }
  .completion.show { display:flex; animation:fadeIn 0.6s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .completion-ornament {
    font-size:2.5rem; margin-bottom:16px; color:var(--gold);
    animation:gentlePulse 3s ease-in-out infinite;
  }
  @keyframes gentlePulse {
    0%,100% { transform:scale(1);opacity:0.7; }
    50% { transform:scale(1.06);opacity:1; }
  }
  .completion h2 {
    font-family:'Amiri',serif; font-size:1.4rem;
    color:var(--gold-light); margin-bottom:4px;
  }
  .completion p { font-size:0.8rem; color:var(--text-dim); margin-bottom:4px; }
  .completion .rn { font-size:0.95rem; color:var(--gold); margin-bottom:28px; }

  /* ═══ Responsive ═══ */
  @media (max-height:650px) {
    .bead { height:90px; }
    .magnifier { width:130px; height:130px; }
    .mag-name { font-size:1.4rem; }
  }
  @media (min-height:800px) {
    .bead { height:130px; }
    .magnifier { width:180px; height:180px; }
    .mag-name { font-size:2rem; }
  }
</style>
</head>
<body>
<div class="ambient"></div>
<div class="app">

  <div class="header">
    <div class="logo">تمعّن</div>
    <h1>مسبحة أسماء الله الحسنى</h1>
  </div>

  <div class="counter-strip">
    <div class="counter-item">
      <div class="counter-value" id="countV">٠</div>
      <div class="counter-label">تسبيحة</div>
    </div>
    <div class="counter-divider"></div>
    <div class="counter-item">
      <div class="counter-value" id="indexV">—</div>
      <div class="counter-label">من ٩٩</div>
    </div>
    <div class="counter-divider"></div>
    <div class="counter-item">
      <div class="counter-value" id="roundV">٠</div>
      <div class="counter-label">دورة</div>
    </div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>

  <div class="bead-viewport" id="viewport">
    <div class="string-line"></div>
    <div class="particles" id="particles"></div>

    <!-- Magnifier lens -->
    <div class="magnifier" id="magnifier">
      <div class="magnifier-ring"></div>
      <div class="magnifier-glass"></div>
      <div class="magnifier-content">
        <div class="mag-name" id="magName">بسم الله</div>
        <div class="mag-index" id="magIndex">اسحب للبدء</div>
      </div>
    </div>

    <!-- Ripple waves container -->
    <div id="rippleContainer"></div>

    <div class="bead-track" id="track"></div>

    <div class="swipe-hint" id="hint">
      <span class="swipe-arrow">↓</span>
      <span class="swipe-text">اسحب للتسبيح</span>
    </div>
  </div>

  <div class="footer">
    <button class="btn btn-icon" onclick="resetAll()" title="إعادة">↻</button>
    <button class="btn btn-count" onclick="advance()">سبّح</button>
    <button class="btn btn-icon" onclick="goBack()" title="رجوع">↑</button>
  </div>
</div>

<div class="completion" id="completionOvl">
  <div class="completion-ornament">✦</div>
  <h2>تمّت الدورة</h2>
  <p>سبحانك اللهم وبحمدك</p>
  <div class="rn" id="compRound">الدورة ١</div>
  <button class="btn btn-count" onclick="newRound()">دورة جديدة</button>
</div>

<script>
// ═══════════════════════════════════════
// أسماء الله الحسنى — قابلة للتعديل
// ═══════════════════════════════════════
const NAMES=[
  "الرَّحْمَن","الرَّحِيم","المَلِك","القُدُّوس","السَّلَام",
  "المُؤْمِن","المُهَيْمِن","العَزِيز","الجَبَّار","المُتَكَبِّر",
  "الخَالِق","البَارِئ","المُصَوِّر","الغَفَّار","القَهَّار",
  "الوَهَّاب","الرَّزَّاق","الفَتَّاح","العَلِيم","القَابِض",
  "البَاسِط","الخَافِض","الرَّافِع","المُعِزّ","المُذِلّ",
  "السَّمِيع","البَصِير","الحَكَم","العَدْل","اللَّطِيف",
  "الخَبِير","الحَلِيم","العَظِيم","الغَفُور","الشَّكُور",
  "العَلِيّ","الكَبِير","الحَفِيظ","المُقِيت","الحَسِيب",
  "الجَلِيل","الكَرِيم","الرَّقِيب","المُجِيب","الوَاسِع",
  "الحَكِيم","الوَدُود","المَجِيد","البَاعِث","الشَّهِيد",
  "الحَقّ","الوَكِيل","القَوِيّ","المَتِين","الوَلِيّ",
  "الحَمِيد","المُحْصِي","المُبْدِئ","المُعِيد","المُحْيِي",
  "المُمِيت","الحَيّ","القَيُّوم","الوَاجِد","المَاجِد",
  "الوَاحِد","الصَّمَد","القَادِر","المُقْتَدِر","المُقَدِّم",
  "المُؤَخِّر","الأَوَّل","الآخِر","الظَّاهِر","البَاطِن",
  "الوَالِي","المُتَعَالِي","البَرّ","التَّوَّاب","المُنْتَقِم",
  "العَفُوّ","الرَّؤُوف","مَالِكُ المُلْك","ذُو الجَلَالِ وَالإِكْرَام","المُقْسِط",
  "الجَامِع","الغَنِيّ","المُغْنِي","المَانِع","الضَّارّ",
  "النَّافِع","النُّور","الهَادِي","البَدِيع","البَاقِي",
  "الوَارِث","الرَّشِيد","الصَّبُور"
];
const N=NAMES.length;

let cur=0, total=0, rounds=0, counted=new Set(), beadH=110, animating=false;

const toAr=n=>n.toString().replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);

// ═══ Build ═══
function build(){
  const t=document.getElementById('track');
  t.innerHTML='';
  NAMES.forEach((name,i)=>{
    const b=document.createElement('div');
    b.className='bead'; b.dataset.i=i;
    b.innerHTML=`<div class="stone"><span class="stone-name">${name}</span></div><div class="knot"></div>`;
    b.addEventListener('click',()=>{ if(+b.dataset.i===cur) countCur(); });
    t.appendChild(b);
  });
  initParticles();
  measure(); pos(false); cls(); ui();
}

function measure(){
  const b=document.querySelector('.bead');
  if(b) beadH=b.offsetHeight||110;
}

function pos(anim=true){
  const t=document.getElementById('track');
  const vp=document.getElementById('viewport');
  const vpH=vp.offsetHeight;
  const off=vpH/2 - (cur*beadH + beadH/2);
  t.style.transition=anim?'transform 0.55s cubic-bezier(0.22,0.85,0.32,1)':'none';
  t.style.transform=`translateY(${off}px)`;
}

function cls(){
  document.querySelectorAll('.bead').forEach((b,i)=>{
    b.classList.remove('flash');
    if(counted.has(i)) b.classList.add('counted');
    const d=Math.abs(i-cur);
    b.dataset.dist = d===0?'0':d===1?'1':d===2?'2':d===3?'3':'far';
  });
}

function ui(){
  document.getElementById('countV').textContent=toAr(total);
  document.getElementById('indexV').textContent=toAr(cur+1);
  document.getElementById('roundV').textContent=toAr(rounds);
  document.getElementById('progFill').style.width=`${(counted.size/N)*100}%`;
}

// ═══ Magnifier update ═══
function updateMag(index,animate=true){
  const el=document.getElementById('magName');
  const idx=document.getElementById('magIndex');
  el.textContent=NAMES[index];
  idx.textContent=`${toAr(index+1)} من ٩٩`;
  if(animate){
    el.classList.remove('ripple');
    void el.offsetWidth;
    el.classList.add('ripple');
  }
}

// ═══ Ripple wave ═══
function spawnRipple(){
  const c=document.getElementById('rippleContainer');
  const r=document.createElement('div');
  r.className='ripple-wave';
  c.appendChild(r);
  void r.offsetWidth;
  r.classList.add('animate');
  setTimeout(()=>r.remove(),1300);
}

// ═══ Particles ═══
function initParticles(){
  const c=document.getElementById('particles');
  c.innerHTML='';
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=`${20+Math.random()*60}%`;
    p.style.top=`${10+Math.random()*80}%`;
    p.style.width=p.style.height=`${1+Math.random()*1.5}px`;
    p.style.setProperty('--dur',`${6+Math.random()*8}s`);
    p.style.setProperty('--delay',`${Math.random()*6}s`);
    p.style.setProperty('--peak',`${0.05+Math.random()*0.1}`);
    p.style.setProperty('--dy',`${-20-Math.random()*40}px`);
    p.style.setProperty('--dx',`${-10+Math.random()*20}px`);
    c.appendChild(p);
  }
  // Start drifting after a beat
  setTimeout(()=>{
    c.querySelectorAll('.particle').forEach(p=>p.classList.add('drift'));
  },500);
}

// ═══ Count ═══
function countCur(){
  if(animating||counted.has(cur)) return;
  counted.add(cur); total++;
  if(navigator.vibrate) navigator.vibrate(10);

  // Visual feedback
  const b=document.querySelectorAll('.bead')[cur];
  b.classList.add('flash','counted');
  spawnRipple();
  updateMag(cur,true);
  cls(); ui(); save();

  document.getElementById('hint').classList.add('hidden');

  if(counted.size===N){
    rounds++; ui(); save();
    setTimeout(showComp,800);
    return;
  }
  setTimeout(()=>{ if(cur<N-1) moveTo(cur+1); },400);
}

function advance(){
  if(animating) return;
  if(!counted.has(cur)){ countCur(); return; }
  let next=cur+1, a=0;
  while(next<N&&counted.has(next)&&a<N){ next++; a++; }
  if(next<N) moveTo(next);
}

function goBack(){
  if(!animating&&cur>0) moveTo(cur-1);
}

function moveTo(i){
  if(i<0||i>=N) return;
  animating=true; cur=i;
  pos(true); cls(); ui();
  updateMag(i,true);
  setTimeout(()=>{ animating=false; },550);
}

// ═══ Touch ═══
let tY=0,tMoved=false;
function initTouch(){
  const vp=document.getElementById('viewport');
  vp.addEventListener('touchstart',e=>{
    tY=e.touches[0].clientY; tMoved=false;
  },{passive:true});
  vp.addEventListener('touchmove',()=>{ tMoved=true; },{passive:true});
  vp.addEventListener('touchend',e=>{
    const dy=e.changedTouches[0].clientY-tY;
    if(!tMoved||Math.abs(dy)<25) return;
    if(dy<-25){
      if(!counted.has(cur)) countCur();
      else if(cur<N-1) moveTo(cur+1);
    } else if(dy>25) goBack();
  },{passive:true});

  vp.addEventListener('wheel',e=>{
    e.preventDefault();
    if(animating) return;
    if(e.deltaY>0){
      if(!counted.has(cur)) countCur();
      else if(cur<N-1) moveTo(cur+1);
    } else if(e.deltaY<0) goBack();
  },{passive:false});
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowDown'){e.preventDefault();advance();}
  else if(e.code==='ArrowUp'){e.preventDefault();goBack();}
});

// ═══ Completion ═══
function showComp(){
  document.getElementById('compRound').textContent=`الدورة ${toAr(rounds)}`;
  document.getElementById('completionOvl').classList.add('show');
}
function newRound(){
  document.getElementById('completionOvl').classList.remove('show');
  counted.clear(); cur=0;
  document.querySelectorAll('.bead').forEach(b=>b.classList.remove('counted','flash'));
  pos(false); cls(); ui(); save();
  updateMag(0,false);
  document.getElementById('magName').textContent='بسم الله';
  document.getElementById('magIndex').textContent='اسحب للبدء';
}

// ═══ Reset ═══
function resetAll(){
  if(total===0) return;
  if(!confirm('إعادة العداد؟')) return;
  cur=0; total=0; rounds=0; counted.clear();
  document.querySelectorAll('.bead').forEach(b=>b.classList.remove('counted','flash'));
  pos(false); cls(); ui();
  localStorage.removeItem('taamun_tasbeeh');
  document.getElementById('hint').classList.remove('hidden');
  document.getElementById('magName').textContent='بسم الله';
  document.getElementById('magIndex').textContent='اسحب للبدء';
}

// ═══ Save/Load ═══
function save(){
  localStorage.setItem('taamun_tasbeeh',JSON.stringify({
    cur,total,rounds,counted:[...counted]
  }));
}
function load(){
  try{
    const s=JSON.parse(localStorage.getItem('taamun_tasbeeh'));
    if(!s) return;
    cur=s.cur??0; total=s.total??0; rounds=s.rounds??0;
    counted=new Set(s.counted??[]);
    counted.forEach(i=>{
      const b=document.querySelectorAll('.bead')[i];
      if(b) b.classList.add('counted');
    });
    if(total>0){
      document.getElementById('hint').classList.add('hidden');
      updateMag(cur,false);
    }
  }catch(e){}
}

window.addEventListener('resize',()=>{ measure(); pos(false); });

// ═══ Init ═══
build(); load(); pos(false); cls(); ui(); initTouch();
</script>
