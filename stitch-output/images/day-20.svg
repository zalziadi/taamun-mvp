<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="lakeGlow20" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e6d4a4;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#e6d4a4;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="waterSurface20" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#37342f;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#2c2a24;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1e1b16;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Night sky with stars -->
  <rect width="800" height="600" fill="#15130f"/>

  <!-- Stars scattered across sky -->
  <g opacity="0.7" fill="#e6d4a4">
    <circle cx="80" cy="60" r="1.5"/>
    <circle cx="180" cy="100" r="1"/>
    <circle cx="280" cy="50" r="1.5"/>
    <circle cx="380" cy="80" r="1"/>
    <circle cx="480" cy="40" r="1.5"/>
    <circle cx="580" cy="90" r="1"/>
    <circle cx="680" cy="60" r="1.5"/>
    <circle cx="750" cy="110" r="1"/>
    <circle cx="120" cy="140" r="1"/>
    <circle cx="650" cy="130" r="1"/>
  </g>

  <!-- Still lake surface -->
  <ellipse cx="400" cy="350" rx="350" ry="160" fill="url(#waterSurface20)"/>

  <!-- Perfect water reflection of stars -->
  <g opacity="0.5" fill="#c9b88a">
    <circle cx="80" cy="640" r="1.5"/>
    <circle cx="180" cy="600" r="1"/>
    <circle cx="280" cy="650" r="1.5"/>
    <circle cx="380" cy="620" r="1"/>
    <circle cx="480" cy="660" r="1.5"/>
    <circle cx="580" cy="610" r="1"/>
    <circle cx="680" cy="640" r="1.5"/>
    <circle cx="750" cy="590" r="1"/>
    <circle cx="120" cy="560" r="1"/>
    <circle cx="650" cy="570" r="1"/>
  </g>

  <!-- Horizon line (very subtle) -->
  <line x1="0" y1="350" x2="800" y2="350" stroke="#d7c596" stroke-width="1" opacity="0.15"/>

  <!-- Glowing reflection point in center of lake -->
  <circle cx="400" cy="350" r="70" fill="url(#lakeGlow20)"/>

  <!-- Central reflection glow -->
  <circle cx="400" cy="350" r="30" fill="#e6d4a4" opacity="0.3"/>

  <!-- Subtle ripples showing perfect stillness -->
  <g stroke="#c9b88a" fill="none" opacity="0.15">
    <circle cx="400" cy="350" r="40"/>
    <circle cx="400" cy="350" r="60"/>
    <circle cx="400" cy="350" r="80"/>
  </g>

  <!-- Mountain/landscape silhouettes at horizon -->
  <path d="M 0 350 Q 100 300 200 330 Q 300 280 400 320 Q 500 280 600 330 Q 700 300 800 350" stroke="#37342f" stroke-width="3" fill="none" opacity="0.4"/>

  <!-- Glow beneath landscape -->
  <g opacity="0.1">
    <ellipse cx="200" cy="380" rx="80" ry="40" fill="#e6d4a4"/>
    <ellipse cx="600" cy="380" rx="80" ry="40" fill="#e6d4a4"/>
  </g>
</svg>