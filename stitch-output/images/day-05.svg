<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sand5" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2c2a24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#37342f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#15130f"/>

  <!-- Sand -->
  <path d="M 0 450 Q 200 420 400 450 T 800 450 L 800 600 L 0 600 Z" fill="url(#sand5)"/>

  <!-- Rain drops falling with trails -->
  <g opacity="0.7">
    <!-- Drop 1 -->
    <line x1="150" y1="100" x2="145" y2="450" stroke="#c9b88a" stroke-width="2" opacity="0.5"/>
    <circle cx="145" cy="455" r="4" fill="#c9b88a"/>

    <!-- Drop 2 -->
    <line x1="300" y1="80" x2="305" y2="450" stroke="#d7c596" stroke-width="2" opacity="0.5"/>
    <circle cx="305" cy="455" r="4" fill="#d7c596"/>

    <!-- Drop 3 -->
    <line x1="450" y1="120" x2="455" y2="450" stroke="#c9b88a" stroke-width="2" opacity="0.5"/>
    <circle cx="455" cy="455" r="4" fill="#c9b88a"/>

    <!-- Drop 4 -->
    <line x1="600" y1="90" x2="595" y2="450" stroke="#d7c596" stroke-width="2" opacity="0.5"/>
    <circle cx="595" cy="455" r="4" fill="#d7c596"/>

    <!-- Drop 5 -->
    <line x1="700" y1="110" x2="705" y2="450" stroke="#c9b88a" stroke-width="2" opacity="0.5"/>
    <circle cx="705" cy="455" r="4" fill="#c9b88a"/>
  </g>

  <!-- Water spots on sand -->
  <g opacity="0.4" fill="#c9b88a">
    <circle cx="145" cy="460" r="12"/>
    <circle cx="305" cy="460" r="14"/>
    <circle cx="455" cy="460" r="12"/>
    <circle cx="595" cy="460" r="13"/>
    <circle cx="705" cy="460" r="12"/>
  </g>

  <!-- Dark clouds suggestion -->
  <g opacity="0.15">
    <ellipse cx="200" cy="80" rx="80" ry="40" fill="#1e1b16"/>
    <ellipse cx="400" cy="60" rx="100" ry="50" fill="#1e1b16"/>
    <ellipse cx="650" cy="90" rx="80" ry="35" fill="#1e1b16"/>
  </g>
</svg>