<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ripple10" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e6d4a4;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#e6d4a4;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#15130f"/>

  <!-- Center point -->
  <circle cx="400" cy="300" r="4" fill="#e6d4a4"/>

  <!-- Concentric ripples - expanding outward -->
  <g stroke="#e6d4a4" fill="none" opacity="0.8">
    <circle cx="400" cy="300" r="30" stroke-width="2"/>
  </g>

  <g stroke="#d7c596" fill="none" opacity="0.6">
    <circle cx="400" cy="300" r="60" stroke-width="1.5"/>
  </g>

  <g stroke="#c9b88a" fill="none" opacity="0.5">
    <circle cx="400" cy="300" r="90" stroke-width="1.5"/>
  </g>

  <g stroke="#e6d4a4" fill="none" opacity="0.4">
    <circle cx="400" cy="300" r="120" stroke-width="1"/>
  </g>

  <g stroke="#d7c596" fill="none" opacity="0.3">
    <circle cx="400" cy="300" r="150" stroke-width="1"/>
  </g>

  <g stroke="#c9b88a" fill="none" opacity="0.2">
    <circle cx="400" cy="300" r="180" stroke-width="1"/>
  </g>

  <!-- Secondary ripples in between -->
  <g stroke="#e6d4a4" fill="none" opacity="0.2">
    <circle cx="400" cy="300" r="45" stroke-width="0.8"/>
    <circle cx="400" cy="300" r="75" stroke-width="0.8"/>
    <circle cx="400" cy="300" r="105" stroke-width="0.8"/>
    <circle cx="400" cy="300" r="135" stroke-width="0.8"/>
    <circle cx="400" cy="300" r="165" stroke-width="0.8"/>
  </g>

  <!-- Subtle glow in center -->
  <circle cx="400" cy="300" r="50" fill="url(#ripple10)" opacity="0.5"/>
</svg>