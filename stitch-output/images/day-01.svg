<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e6d4a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6d4a4;stop-opacity:0" />
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#15130f"/>

  <!-- Central glow effect -->
  <circle cx="400" cy="300" r="80" fill="url(#glow1)" opacity="0.8"/>

  <!-- Glowing point of light -->
  <circle cx="400" cy="300" r="12" fill="#e6d4a4" filter="url(#blur1)"/>
  <circle cx="400" cy="300" r="6" fill="#e6d4a4"/>

  <!-- Subtle concentric circles around light -->
  <circle cx="400" cy="300" r="40" fill="none" stroke="#c9b88a" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="300" r="60" fill="none" stroke="#c9b88a" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="300" r="80" fill="none" stroke="#c9b88a" stroke-width="1" opacity="0.1"/>
</svg>