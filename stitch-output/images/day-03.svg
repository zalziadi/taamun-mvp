<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="palmGlow3" cx="50%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#e6d4a4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e6d4a4;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#15130f"/>

  <!-- Golden light glow -->
  <circle cx="400" cy="250" r="120" fill="url(#palmGlow3)"/>

  <!-- Left hand (open palm) -->
  <g transform="translate(300, 300)">
    <!-- Palm -->
    <ellipse cx="0" cy="0" rx="35" ry="50" fill="#c9b88a"/>
    <!-- Fingers -->
    <rect x="-28" y="-55" width="12" height="70" rx="6" fill="#c9b88a" transform="rotate(-20 -22 0)"/>
    <rect x="-10" y="-60" width="12" height="80" rx="6" fill="#c9b88a"/>
    <rect x="10" y="-60" width="12" height="80" rx="6" fill="#c9b88a"/>
    <rect x="28" y="-55" width="12" height="70" rx="6" fill="#c9b88a" transform="rotate(20 34 0)"/>
  </g>

  <!-- Right hand (open palm) -->
  <g transform="translate(500, 300)">
    <!-- Palm -->
    <ellipse cx="0" cy="0" rx="35" ry="50" fill="#d7c596"/>
    <!-- Fingers -->
    <rect x="-28" y="-55" width="12" height="70" rx="6" fill="#d7c596" transform="rotate(-20 -22 0)"/>
    <rect x="-10" y="-60" width="12" height="80" rx="6" fill="#d7c596"/>
    <rect x="10" y="-60" width="12" height="80" rx="6" fill="#d7c596"/>
    <rect x="28" y="-55" width="12" height="70" rx="6" fill="#d7c596" transform="rotate(20 34 0)"/>
  </g>

  <!-- Light rays between hands -->
  <g opacity="0.4">
    <line x1="330" y1="280" x2="470" y2="280" stroke="#e6d4a4" stroke-width="2"/>
    <line x1="320" y1="300" x2="480" y2="300" stroke="#e6d4a4" stroke-width="1.5"/>
    <line x1="330" y1="320" x2="470" y2="320" stroke="#e6d4a4" stroke-width="2"/>
  </g>
</svg>