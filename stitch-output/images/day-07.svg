<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pathGlow7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9b88a;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#d7c596;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#c9b88a;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#15130f"/>

  <!-- Desert dunes -->
  <path d="M 0 400 Q 100 350 200 380 Q 300 410 400 350 Q 500 410 600 380 Q 700 350 800 400 L 800 600 L 0 600 Z" fill="#2c2a24"/>
  <path d="M 0 380 Q 150 330 300 360 Q 450 390 600 360 Q 700 340 800 380 L 800 600 L 0 600 Z" fill="#37342f" opacity="0.6"/>

  <!-- Path through desert - double line for depth -->
  <path d="M 100 500 Q 200 400 300 320 Q 400 240 500 180 Q 600 120 700 100" stroke="url(#pathGlow7)" stroke-width="12" fill="none"/>
  <path d="M 100 500 Q 200 400 300 320 Q 400 240 500 180 Q 600 120 700 100" stroke="#e6d4a4" stroke-width="6" fill="none" opacity="0.4"/>

  <!-- Path highlights -->
  <circle cx="100" cy="500" r="8" fill="#c9b88a" opacity="0.6"/>
  <circle cx="700" cy="100" r="6" fill="#e6d4a4" opacity="0.7"/>

  <!-- Subtle footprints along path -->
  <g opacity="0.2">
    <circle cx="200" cy="420" r="3" fill="#d7c596"/>
    <circle cx="300" cy="330" r="3" fill="#d7c596"/>
    <circle cx="400" cy="250" r="3" fill="#d7c596"/>
    <circle cx="500" cy="190" r="3" fill="#d7c596"/>
    <circle cx="600" cy="130" r="3" fill="#d7c596"/>
  </g>

  <!-- Stars above destination -->
  <g opacity="0.5">
    <circle cx="680" cy="50" r="1.5" fill="#e6d4a4"/>
    <circle cx="720" cy="40" r="1" fill="#e6d4a4"/>
    <circle cx="750" cy="60" r="1.5" fill="#e6d4a4"/>
  </g>
</svg>