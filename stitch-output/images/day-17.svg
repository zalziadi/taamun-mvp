<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vastDesert17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2a24;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#37342f;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Vast desert sky -->
  <rect width="800" height="600" fill="#15130f"/>

  <!-- Subtle distant dune lines - very minimal -->
  <g opacity="0.1" stroke="#c9b88a" stroke-width="1">
    <path d="M 0 300 Q 150 270 300 300 T 600 300 T 800 300"/>
    <path d="M 0 350 Q 200 320 400 350 T 800 350"/>
    <path d="M 0 400 Q 175 370 350 400 T 700 400 T 800 400"/>
  </g>

  <!-- Far horizon -->
  <line x1="0" y1="450" x2="800" y2="450" stroke="#2c2a24" stroke-width="80" opacity="0.6"/>

  <!-- Single distant point of interest (tiny figure or settlement) -->
  <g opacity="0.15">
    <circle cx="400" cy="440" r="3" fill="#c9b88a"/>
  </g>

  <!-- Vast empty space - just subtle texture -->
  <g opacity="0.05" fill="#37342f">
    <circle cx="150" cy="200" r="2"/>
    <circle cx="350" cy="180" r="1.5"/>
    <circle cx="600" cy="220" r="1.5"/>
    <circle cx="700" cy="150" r="2"/>
  </g>

  <!-- Very subtle wind patterns in sand -->
  <g opacity="0.08" stroke="#d7c596" stroke-width="0.5" fill="none">
    <path d="M 0 500 Q 100 490 200 500 T 400 500 T 600 500 T 800 500"/>
    <path d="M 0 520 Q 120 510 240 520 T 480 520 T 720 520 T 800 520"/>
  </g>

  <!-- Extreme emptiness - mostly dark canvas with minimal elements -->
  <!-- No other visual clutter - intentional minimalism -->
</svg>