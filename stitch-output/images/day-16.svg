<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="oceanGrad16" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2a24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#37342f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b16;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="400" fill="#15130f"/>

  <!-- Ocean gradient -->
  <rect width="800" height="200" y="400" fill="url(#oceanGrad16)"/>

  <!-- Horizon line -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#d7c596" stroke-width="2" opacity="0.5"/>

  <!-- Calm waves - very gentle, subtle curves -->
  <g stroke="#c9b88a" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M 0 420 Q 100 410 200 420 T 400 420 T 600 420 T 800 420"/>
    <path d="M 0 445 Q 100 435 200 445 T 400 445 T 600 445 T 800 445"/>
    <path d="M 0 470 Q 100 460 200 470 T 400 470 T 600 470 T 800 470"/>
    <path d="M 0 495 Q 100 485 200 495 T 400 495 T 600 495 T 800 495"/>
  </g>

  <!-- Subtle secondary waves -->
  <g stroke="#d7c596" stroke-width="1" fill="none" opacity="0.2">
    <path d="M 0 430 Q 80 425 160 430 T 320 430 T 480 430 T 640 430 T 800 430"/>
    <path d="M 0 460 Q 80 455 160 460 T 320 460 T 480 460 T 640 460 T 800 460"/>
  </g>

  <!-- Calm water reflections -->
  <g opacity="0.3" fill="#e6d4a4">
    <circle cx="150" cy="350" r="2"/>
    <circle cx="350" cy="340" r="1.5"/>
    <circle cx="550" cy="350" r="2"/>
    <circle cx="700" cy="345" r="1.5"/>
  </g>

  <!-- Sky elements - distant clouds or stars fading -->
  <g opacity="0.15">
    <ellipse cx="200" cy="100" rx="60" ry="30" fill="#c9b88a"/>
    <ellipse cx="550" cy="120" rx="70" ry="35" fill="#c9b88a"/>
  </g>

  <!-- Light glow on horizon -->
  <ellipse cx="400" cy="400" rx="200" ry="50" fill="#c9b88a" opacity="0.15"/>
</svg>