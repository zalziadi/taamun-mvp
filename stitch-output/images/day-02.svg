<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dune2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#37342f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c2a24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#15130f"/>

  <!-- Layered dunes -->
  <path d="M 0 500 Q 200 450 400 480 T 800 500 L 800 600 L 0 600 Z" fill="#37342f" opacity="0.9"/>
  <path d="M 0 420 Q 150 370 300 400 Q 450 430 600 390 Q 700 370 800 420 L 800 500 Q 400 480 0 500 Z" fill="#2c2a24" opacity="0.85"/>
  <path d="M 0 340 Q 100 300 250 330 Q 400 360 550 320 Q 700 290 800 340 L 800 420 Q 400 430 0 420 Z" fill="#37342f" opacity="0.8"/>
  <path d="M 0 260 Q 150 220 350 260 Q 550 300 800 260 L 800 340 Q 400 360 0 340 Z" fill="#2c2a24" opacity="0.75"/>

  <!-- Subtle light accent on top dunes -->
  <path d="M 0 260 Q 150 220 350 260 Q 550 300 800 260" fill="none" stroke="#c9b88a" stroke-width="2" opacity="0.3"/>
</svg>